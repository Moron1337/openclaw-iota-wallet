name: nightly-release-gate

on:
  schedule:
    - cron: '29 3 * * *'
  workflow_dispatch:

jobs:
  release-gate:
    runs-on:
      - self-hosted
      - linux
      - x64
      - openclaw-iota-wallet
      - hetzner
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Pack
        run: npm pack

      - name: Verify packed plugin archive
        run: bash ./scripts/ci/pack-artifact-smoke.sh
